<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Página 1</title>

  <!-- Fonte semelhante à da imagem -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      background: radial-gradient(circle at top left, #2b2f36, #0f1115);
      font-family: 'Montserrat', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }

    .container {
      text-align: center;
    }

    h1 {
      font-size: 72px;
      font-weight: 600;
      letter-spacing: 4px;
      color: #e6e6e6;
    }

    p {
      margin-top: 15px;
      font-size: 14px;
      font-weight: 300;
      color: #aaa;
      letter-spacing: 2px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Página 1</h1>
    <p>Subtítulo opcional</p>
  </div>
</body>
</html>
